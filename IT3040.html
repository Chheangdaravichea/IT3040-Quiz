<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTLT Quiz - Ôn tập cuối kỳ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #4c1d95;
  }
  .header h1 { font-size: 1.2rem; font-weight: 700; color: #a78bfa; }
  .header .sub { font-size: 0.75rem; color: #7c3aed; margin-top: 2px; }
  .stats-bar {
    display: flex; gap: 16px; font-size: 0.8rem;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 1.1rem; font-weight: 700; color: #a78bfa; }
  .stat-lbl { color: #6b7280; font-size: 0.7rem; }

  .progress-wrap { background: #1e1e2e; padding: 10px 24px; }
  .progress-bar-bg { background: #2d2d3d; border-radius: 4px; height: 6px; }
  .progress-bar-fill { background: linear-gradient(90deg, #7c3aed, #a78bfa); height: 6px; border-radius: 4px; transition: width 0.4s; }
  .progress-text { font-size: 0.72rem; color: #6b7280; margin-top: 4px; text-align: right; }

  .quiz-area { max-width: 760px; margin: 0 auto; padding: 24px 16px; }

  .question-card {
    background: #1a1a2e;
    border: 1px solid #2d2d4e;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-number {
    font-size: 0.7rem; font-weight: 700; color: #7c3aed;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
  .q-text {
    font-size: 0.95rem; line-height: 1.6; color: #e2e8f0; margin-bottom: 20px;
    white-space: pre-wrap; font-family: inherit;
  }
  .q-text code, .code-block {
    font-family: 'Consolas', 'Courier New', monospace;
    background: #0d0d1a;
    border: 1px solid #2d2d4e;
    border-radius: 6px;
    padding: 12px;
    display: block;
    margin: 8px 0;
    font-size: 0.82rem;
    color: #c4b5fd;
    overflow-x: auto;
    white-space: pre;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid #2d2d4e;
    background: #0f0f1a;
    cursor: pointer;
    font-size: 0.88rem;
    line-height: 1.5;
    transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .option:hover { border-color: #7c3aed; background: #1a1230; }
  .option.selected { border-color: #7c3aed; background: #2d1b6b; }
  .option.correct { border-color: #10b981; background: #064e3b; color: #6ee7b7; }
  .option.wrong { border-color: #ef4444; background: #450a0a; color: #fca5a5; }
  .option.reveal-correct { border-color: #10b981; background: #064e3b; color: #6ee7b7; }
  .opt-label {
    font-weight: 700; color: #7c3aed; min-width: 20px;
    flex-shrink: 0;
  }
  .option.correct .opt-label, .option.reveal-correct .opt-label { color: #10b981; }
  .option.wrong .opt-label { color: #ef4444; }

  .feedback {
    margin-top: 14px; padding: 10px 14px;
    border-radius: 8px; font-size: 0.82rem; display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #064e3b; border: 1px solid #10b981; color: #6ee7b7; }
  .feedback.bad { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }

  .controls {
    display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap;
    padding: 0 16px 24px; max-width: 760px; margin: 0 auto;
  }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none;
    font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #7c3aed; color: white; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-secondary { background: #1e1e2e; color: #a78bfa; border: 1px solid #4c1d95; }
  .btn-secondary:hover { background: #2d1b6b; }
  .btn-danger { background: #991b1b; color: #fca5a5; }
  .btn-danger:hover { background: #7f1d1d; }

  .result-screen {
    display: none; text-align: center; padding: 48px 24px;
    max-width: 500px; margin: 0 auto;
  }
  .result-screen.show { display: block; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    border: 4px solid #7c3aed;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; margin: 0 auto 24px;
    background: #1a1a2e;
  }
  .score-pct { font-size: 2rem; font-weight: 800; color: #a78bfa; }
  .score-frac { font-size: 0.8rem; color: #6b7280; }
  .result-title { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
  .result-sub { color: #6b7280; font-size: 0.88rem; margin-bottom: 24px; }

  .mode-bar {
    display: flex; gap: 8px; padding: 12px 24px;
    background: #1a1a2e; border-bottom: 1px solid #2d2d4e;
    flex-wrap: wrap; align-items: center;
  }
  .mode-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #2d2d4e;
    background: transparent; color: #9ca3af; font-size: 0.78rem; cursor: pointer;
  }
  .mode-btn.active { background: #7c3aed; border-color: #7c3aed; color: white; }
  .mode-label { font-size: 0.75rem; color: #4b5563; margin-right: 4px; }

  .nav-dots {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 10px 24px; max-width: 760px; margin: 0 auto;
  }
  .dot {
    width: 20px; height: 20px; border-radius: 4px; font-size: 0.6rem;
    border: none; cursor: pointer; font-weight: 600;
    background: #1e1e2e; color: #6b7280; transition: all 0.1s;
  }
  .dot.answered { background: #7c3aed; color: white; }
  .dot.current { outline: 2px solid #a78bfa; }
  .dot.correct-dot { background: #065f46; color: #6ee7b7; }
  .dot.wrong-dot { background: #7f1d1d; color: #fca5a5; }

  @media (max-width: 600px) {
    .header { flex-direction: column; gap: 10px; align-items: flex-start; }
    .q-text { font-size: 0.88rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h1" style="font-size:1.1rem;font-weight:700;color:#a78bfa">⚡ KTLT Quiz – Ôn tập cuối kỳ</div>
    <div class="sub">Kỹ Thuật Lập Trình · HUST · 95 câu</div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="s-correct">0</div><div class="stat-lbl">Đúng</div></div>
    <div class="stat"><div class="stat-val" id="s-wrong">0</div><div class="stat-lbl">Sai</div></div>
    <div class="stat"><div class="stat-val" id="s-remain">95</div><div class="stat-lbl">Còn lại</div></div>
  </div>
</div>

<div class="mode-bar">
  <span class="mode-label">Chế độ:</span>
  <button class="mode-btn active" onclick="setMode('practice')">Luyện tập</button>
  <button class="mode-btn" onclick="setMode('exam')">Thi thử</button>
  <button class="mode-btn" onclick="setMode('review')">Xem đáp án</button>
  <span style="margin-left:auto">
    <button class="btn btn-secondary" style="padding:5px 12px;font-size:0.75rem" onclick="shuffleQuestions()">🔀 Trộn đề</button>
    <button class="btn btn-danger" style="padding:5px 12px;font-size:0.75rem;margin-left:6px" onclick="resetQuiz()">↺ Reset</button>
  </span>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-text" id="prog-text">Câu 1 / 95</div>
</div>

<div class="nav-dots" id="nav-dots"></div>

<div class="quiz-area" id="quiz-area">
  <div class="question-card" id="q-card">
    <div class="q-number" id="q-num">Câu 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="feedback" id="q-feedback"></div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-secondary" onclick="prevQ()">← Trước</button>
  <button class="btn btn-secondary" onclick="skipQ()">Bỏ qua</button>
  <button class="btn btn-primary" onclick="nextQ()">Tiếp →</button>
</div>

<div class="result-screen" id="result-screen">
  <div class="score-circle">
    <div class="score-pct" id="res-pct">0%</div>
    <div class="score-frac" id="res-frac">0/95</div>
  </div>
  <div class="result-title" id="res-title">Kết quả</div>
  <div class="result-sub" id="res-sub"></div>
  <button class="btn btn-primary" style="margin-right:8px" onclick="resetQuiz()">Làm lại</button>
  <button class="btn btn-secondary" onclick="reviewMode()">Xem đáp án</button>
</div>

<script>
const ALL_QUESTIONS = [
  {
    q: "Chọn phát biểu ĐÚNG về hàm có tham số ngầm định trong C++",
    opts: [
      "Khi hàm có tham số ngầm định có prototype, thì giá trị ngầm định trong định nghĩa hàm có ý nghĩa cao hơn giá trị định nghĩa trong prototype.",
      "Khi đa năng hóa toán tử không được dùng tham số có giá trị ngầm định.",
      "Tham số ngầm định của hàm có thể nằm ở vị trí bất kỳ trong hàm có danh sách tham số nhiều hơn các tham số ngầm định.",
      "Tất cả các phát biểu trên đều sai."
    ],
    ans: 1
  },
  {
    q: "Trong những phát biểu sau đây về sử dụng các khoảng trắng trong phong cách lập trình, phát biểu nào ĐÚNG?",
    opts: [
      "Sử dụng tab thay cho space để căn lề (indentation)",
      "Sử dụng khoảng trắng để mã nguồn dễ đọc",
      "Không nên sử dụng tính năng tự động căn lề của trình soạn thảo",
      "Không cần phải căn lề do việc căn lề không làm thay đổi việc biên dịch chương trình"
    ],
    ans: 1
  },
  {
    q: "Một biến được gọi là biến toàn cục nếu:",
    opts: [
      "Nó được khai báo trong tất cả các hàm, ngoại trừ hàm main().",
      "Nó được khai báo bên trong hàm main().",
      "Nó được khai báo ngoài tất cả các hàm, kể cả hàm main()",
      "Nó được khai báo bên ngoài hàm main()."
    ],
    ans: 2
  },
  {
    q: "Một biến được gọi là một biến cục bộ nếu:",
    opts: [
      "Nó được khai báo bên trong các hàm ngoại trừ hàm main().",
      "Nó được khai báo bên trong hàm main().",
      "Nó được khai báo bên ngoài các hàm kể cả hàm main().",
      "Nó được khai báo bên trong các các hàm kể cả hàm main()."
    ],
    ans: 3
  },
  {
    q: "Để hiển thị fileName và lineNumber của một file mã nguồn C bất kỳ và một dòng bất kỳ, ta dùng các macro nào?",
    opts: [
      "Tất cả các đáp án còn lại đều sai",
      "__NAME__ và __NUMBER__",
      "__FILE__ và __NUM__",
      "__FILE__ và __LINE__"
    ],
    ans: 3
  },
  {
    q: "Đâu không phải là ngôn ngữ lập trình bậc cao?",
    opts: ["Python", "Pascal", "PHP", "Assembly"],
    ans: 3
  },
  {
    q: "Đâu không phải là một trình biên dịch của ngôn ngữ C++?",
    opts: ["Cython", "MSS Visual C++", "GNU GCC", "Clang", "Watcom C/C++"],
    ans: 0
  },
  {
    q: "Phát biểu nào sau về kỹ thuật Assertion là SAI?",
    opts: [
      "Assertion là một macro hay một chương trình con dùng trong quá trình phát triển ứng dụng, cho phép chương trình tự kiểm tra khi chạy.",
      "Assertion có thể dùng để kiểm tra giả thiết được đưa ra trong code và loại bỏ những điều kiện không mong đợi.",
      "Assertion là một kỹ thuật sử dụng trong lập trình phòng ngừa.",
      "Assertion là kỹ thuật để phát hiện các lỗi liên quan tới bộ nhớ trong chương trình"
    ],
    ans: 3
  },
  {
    q: "Chọn thứ tự ưu tiên đúng của các toán tử logic trong C/C++ (Từ cao → thấp):",
    opts: ["NOT, OR, AND", "NOT, AND, OR", "AND, NOT, OR", "OR, NOT, AND"],
    ans: 1
  },
  {
    q: "Thư viện nào giúp chương trình dừng lại ngay lập tức khi vi phạm một điều kiện nào đó?",
    opts: ["Tất cả các đáp án còn lại đều đúng", "exception.h", "assert.h", "fault.h"],
    ans: 2
  },
  {
    q: "Giả sử ma trận hai chiều arr được khai báo:\nint a[1000][1000];\nXét hai số nguyên i, j (0 ≤ i, j ≤ n). Các chỉ số hàng và cột được đánh số từ 0.\nHãy chỉ ra câu lệnh đúng để in ra giá trị phần tử hàng i cột j của ma trận.\n(Chọn TẤT CẢ đáp án đúng – đây là câu nhiều đáp án, chọn đáp án đúng nhất)",
    opts: [
      "cout << a[i][j] << endl;",
      "cout << *(a + i + 1) + j + 1 << endl;",
      "cout << *(a + j) + i << endl;",
      "cout << *(*(a + i) + j) << endl;",
      "cout << *(a + i) + j << endl;"
    ],
    ans: 0,
    alsoCorrect: [3]
  },
  {
    q: "Chọn đáp án SAI trong các phát biểu sau:",
    opts: [
      "Biến tĩnh (static) nằm trong cùng vùng nhớ cấp phát cho biến tổng thể",
      "Dữ liệu cấp phát động và biến trỏ nằm trong vùng nhớ heap",
      "Biến cục bộ và tham số của hàm nằm trong vùng nhớ stack",
      "Biến thanh ghi (register) nằm ngay trong CPU"
    ],
    ans: 1,
    note: "Biến con trỏ (pointer variable) nằm trong stack, chỉ vùng dữ liệu nó trỏ đến mới ở heap."
  },
  {
    q: "Cho khai báo: int M[][] = {{1,2,3},{4,5},};\nHãy lựa chọn đáp án Đúng:",
    opts: [
      "M là mảng 2 chiều có kích thước 2 x 3",
      "M là mảng 2 chiều có kích thước 3 x 3",
      "M là mảng Không xác định",
      "Có lỗi syntax"
    ],
    ans: 3
  },
  {
    q: "Cấu trúc dữ liệu có thứ tự truy cập phần tử theo kiểu: vào sau ra trước",
    opts: ["Queue", "Stack", "Vector", "Array"],
    ans: 1
  },
  {
    q: "Trong các loại sau đây, loại nào không phải là đệ quy trực tiếp?",
    opts: ["Đệ quy nhị phân", "Đệ quy tuyến tính", "Đệ quy phi tuyến", "Đệ quy tương hỗ"],
    ans: 3
  },
  {
    q: "Khuyến nghị ĐÚNG về quy tắc đặt tên phong cách lập trình tốt là:",
    opts: [
      "Dùng chuỗi ký tự ngẫu nhiên để đặt tên",
      "Đặt tên có ý nghĩa để từ tên gọi có thể hiểu được vai trò của nó",
      "Chỉ dùng các ký tự đơn để đặt tên giúp viết mã nguồn nhanh chóng",
      "Đặt tên biến càng dài càng tốt"
    ],
    ans: 1
  },
  {
    q: "Khi truy cập lần lượt các phần tử của mảng hai chiều kích thước 30x30, cách nào thường đem lại hiệu quả tốt hơn về tốc độ?",
    opts: [
      "Truy cập phần tử cuối cùng rồi giảm dần chỉ số hàng, khi đến giới hạn thì gán chỉ số cột về 29 rồi giảm chỉ số cột.",
      "Truy cập phần tử cuối cùng rồi giảm dần chỉ số cột, khi đến giới hạn thì gán chỉ số cột về 29 rồi giảm chỉ số hàng.",
      "Truy cập phần tử đầu tiên rồi tăng dần chỉ số hàng, khi đến giới hạn thì gán chỉ số hàng về 0 rồi tăng chỉ số cột.",
      "Truy cập phần tử đầu tiên rồi tăng dần chỉ số cột, khi đến giới hạn thì gán chỉ số cột về 0 rồi tăng chỉ số hàng."
    ],
    ans: 3
  },
  {
    q: "Mô tả nào sau đây đúng với khuôn mẫu hàm (function template) trong C++:",
    opts: [
      "Cho phép người lập trình xây dựng các hàm tổng quát",
      "Cho phép người lập trình tạo chương trình theo mô-đun",
      "Cho phép lập trình viên viết các đoạn mã cụ thể cho một vấn đề",
      "Một tính năng không bổ sung bất kỳ sức mạnh nào cho ngôn ngữ"
    ],
    ans: 0
  },
  {
    q: "Phương pháp nào không được dùng để khử đệ quy?",
    opts: [
      "Khử đệ quy bằng vòng lặp",
      "Khử đệ quy đuôi",
      "Khử đệ quy bằng Stack",
      "Khử đệ quy bằng Queue"
    ],
    ans: 3
  },
  {
    q: "Statement coverage là phương pháp đo độ bao phủ kiểm thử. Statement coverage đạt 100% có nghĩa là:",
    opts: [
      "Toàn bộ chức năng đã được kiểm thử",
      "Tất cả các dòng lệnh và tất cả các nhánh trong chương trình đã được kiểm tra ít nhất một lần",
      "Tất cả các dòng lệnh trong mã nguồn đã được kiểm tra ít nhất một lần",
      "Tất cả các nhánh trong chương trình đã được kiểm tra ít nhất một lần"
    ],
    ans: 2
  },
  {
    q: "Các khai báo hàm nào dưới đây là hợp lệ:",
    opts: [
      "void MyFunc(int a = 7, float b = 2.0, int c = 5, int d)",
      "void MyFunc(int a, float b = 2.0, int c, int d = 4)",
      "void MyFunc(int a = 7, float b, int c = 5, int d = 4)",
      "void MyFunc(int a, float b = 2.0, int c = 5, int d = 4)"
    ],
    ans: 3,
    note: "Tham số ngầm định phải nằm ở cuối danh sách tham số."
  },
  {
    q: "Đâu là tệp mô tả các đối tượng luồng vào ra chuẩn cin, cout, cerr và clog của C++?",
    opts: ["stdlib", "iostream", "stdio", "fstream"],
    ans: 1
  },
  {
    q: "Cho khai báo nguyên mẫu hàm và các khai báo biến:\nfloat myfunct(int& a, float b);\nint x = 10;\nfloat y = 4.5;\n\nLệnh gọi hàm nào sau đây sẽ đúng về mặt cú pháp?",
    opts: [
      "y = myfunct(24, 4.5);",
      "y = 0.5 * myfunct(x, 4.5);",
      "myfunct(4.5, y);",
      "y = myfunct(x + 5, y);"
    ],
    ans: 1,
    note: "int &a là tham chiếu nên bắt buộc phải truyền vào 1 biến (lvalue). 24 và x+5 là rvalue nên không hợp lệ."

let questions = [...ALL_QUESTIONS];
let currentIdx = 0;
let answers = new Array(questions.length).fill(-1);
let mode = 'practice'; // practice | exam | review

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderQuestion();
  updateStats();
  renderDots();
}

function shuffleQuestions() {
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
    [answers[i], answers[j]] = [answers[j], answers[i]];
  }
  currentIdx = 0;
  renderQuestion();
  renderDots();
  updateStats();
}

function resetQuiz() {
  questions = [...ALL_QUESTIONS];
  answers = new Array(questions.length).fill(-1);
  currentIdx = 0;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  document.querySelector('.controls').style.display = '';
  renderQuestion();
  renderDots();
  updateStats();
}

function reviewMode() {
  mode = 'review';
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', i === 2);
  });
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  document.querySelector('.controls').style.display = '';
  currentIdx = 0;
  renderQuestion();
  renderDots();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  document.getElementById('q-num').textContent = `Câu ${currentIdx + 1} / ${total}`;
  
  // Format question text
  let qText = q.q;
  document.getElementById('q-text').innerHTML = formatText(qText);

  // Progress
  const pct = ((currentIdx + 1) / total * 100).toFixed(0);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `Câu ${currentIdx + 1} / ${total}`;

  // Options
  const answered = answers[currentIdx];
  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = '';
  const labels = ['A','B','C','D','E','F','G'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    
    if (mode === 'review' || answered !== -1) {
      if (i === q.ans || (q.alsoCorrect && q.alsoCorrect.includes(i))) {
        div.classList.add(answered === -1 ? 'reveal-correct' : 'correct');
      } else if (answered === i) {
        div.classList.add('wrong');
      }
    } else if (answered === i) {
      div.classList.add('selected');
    }
    
    div.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${formatText(opt)}</span>`;
    if (mode !== 'review' && answered === -1) {
      div.onclick = () => selectOption(i);
    }
    optDiv.appendChild(div);
  });

  // Feedback
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback';
  if ((mode === 'practice' || mode === 'review') && answered !== -1 && mode !== 'review') {
    fb.classList.add('show');
    if (answered === q.ans || (q.alsoCorrect && q.alsoCorrect.includes(answered))) {
      fb.classList.add('ok');
      fb.textContent = '✓ Chính xác!' + (q.note ? ' — ' + q.note : '');
    } else {
      fb.classList.add('bad');
      const correctLabel = labels[q.ans];
      fb.textContent = `✗ Sai. Đáp án đúng: ${correctLabel}. ${q.note || ''}`;
    }
  } else if (mode === 'review') {
    fb.classList.add('show', 'ok');
    fb.textContent = `Đáp án: ${labels[q.ans]}${q.alsoCorrect ? ' (và ' + q.alsoCorrect.map(x=>labels[x]).join(', ') + ')' : ''}. ${q.note || ''}`;
  }

  updateDotHighlight();
}

function formatText(text) {
  if (text.includes('\n')) {
    const lines = text.split('\n');
    let result = '';
    let inCode = false;
    let codeBlock = '';
    for (const line of lines) {
      const isCode = /^(void|int|float|char|bool|if|for|while|return|printf|cout|struct|typedef|template|inline|auto|switch|case|default|break|#include|using|namespace|assert|delete|new|else)/.test(line.trim()) || 
                     /[{};]/.test(line) || /^\s{2,}/.test(line);
      if (isCode) {
        codeBlock += line + '\n';
        inCode = true;
      } else {
        if (inCode && codeBlock) {
          result += `<code class="code-block">${escHtml(codeBlock.trimEnd())}</code>`;
          codeBlock = ''; inCode = false;
        }
        result += escHtml(line) + '\n';
      }
    }
    if (codeBlock) result += `<code class="code-block">${escHtml(codeBlock.trimEnd())}</code>`;
    return result.replace(/\n(?!<)/g, '<br>');
  }
  return escHtml(text);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectOption(i) {
  if (answers[currentIdx] !== -1) return;
  answers[currentIdx] = i;
  renderQuestion();
  updateStats();
  renderDots();
  
  if (mode === 'exam') {
    // In exam mode, auto-advance after 1s
    setTimeout(() => {
      if (currentIdx < questions.length - 1) nextQ();
      else showResult();
    }, 800);
  }
}

function nextQ() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentIdx > 0) { currentIdx--; renderQuestion(); }
}

function skipQ() {
  nextQ();
}

function showResult() {
  const correct = answers.filter((a, i) => {
    const q = questions[i];
    return a === q.ans || (q.alsoCorrect && q.alsoCorrect.includes(a));
  }).length;
  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-frac').textContent = `${correct}/${total}`;
  document.getElementById('res-title').textContent = pct >= 80 ? '🎉 Xuất sắc!' : pct >= 60 ? '👍 Khá tốt!' : '💪 Cần ôn thêm!';
  document.getElementById('res-sub').textContent = `Đúng ${correct} / ${total} câu. ${pct >= 80 ? 'Sẵn sàng cho kỳ thi rồi!' : 'Ôn lại các câu sai nhé!'}`;
  document.getElementById('result-screen').classList.add('show');
  document.getElementById('quiz-area').style.display = 'none';
  document.querySelector('.controls').style.display = 'none';
}

function updateStats() {
  const correct = answers.filter((a, i) => {
    if (a === -1) return false;
    const q = questions[i];
    return a === q.ans || (q.alsoCorrect && q.alsoCorrect.includes(a));
  }).length;
  const wrong = answers.filter((a, i) => {
    if (a === -1) return false;
    const q = questions[i];
    return a !== q.ans && !(q.alsoCorrect && q.alsoCorrect.includes(a));
  }).length;
  const remain = answers.filter(a => a === -1).length;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-remain').textContent = remain;
}

function renderDots() {
  const container = document.getElementById('nav-dots');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'dot';
    btn.textContent = i + 1;
    if (i === currentIdx) btn.classList.add('current');
    const a = answers[i];
    if (a !== -1) {
      if (a === q.ans || (q.alsoCorrect && q.alsoCorrect.includes(a))) btn.classList.add('correct-dot');
      else btn.classList.add('wrong-dot');
    }
    btn.onclick = () => { currentIdx = i; renderQuestion(); updateDotHighlight(); };
    container.appendChild(btn);
  });
}

function updateDotHighlight() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('current', i === currentIdx);
  });
}

// Init
renderQuestion();
renderDots();
updateStats();
</script>
</body>
</html>
